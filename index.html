<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Viewer Cloud</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #1e1e1e; color: #fff; overflow-x: hidden; }
        
        /* Live Counter UI */
        .live-counter { position: absolute; top: 20px; left: 20px; display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 15px; font-size: 12px; border: 1px solid #333; }
        .dot { width: 8px; height: 8px; background: #4caf50; border-radius: 50%; box-shadow: 0 0 8px #4caf50; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .container { width: 90%; max-width: 600px; display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px; }
        .auth-bar { position: absolute; top: 20px; right: 20px; display: flex; align-items: center; gap: 10px; z-index: 10; }
        .user-img { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #444; }
        .btn-auth { background: #333; color: white; border: 1px solid #444; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 600; }
        textarea { width: 100%; padding: 15px; border: 1px solid #333; border-radius: 25px; font-family: 'Fira Code', monospace; font-size: 14px; resize: none; outline: none; background: #252526; color: #d4d4d4; box-sizing: border-box; height: 50px; text-align: center; }
        .controls-outer { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .toggle-group { display: flex; background: #252526; border-radius: 20px; padding: 2px; border: 1px solid #333; }
        .toggle-group input { display: none; }
        .toggle-group label { padding: 6px 12px; font-size: 11px; font-weight: bold; cursor: pointer; border-radius: 15px; color: #666; transition: 0.2s; }
        .toggle-group input:checked + label { background: #007acc; color: #fff; }
        #history-section { width: 100%; margin-top: 10px; background: #252526; border-radius: 15px; border: 1px solid #333; padding: 15px; display: none; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 12px; color: #888; font-weight: bold; }
        .history-item { padding: 8px 10px; font-size: 13px; border-bottom: 1px solid #333; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #aaa; }
        #viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 100; }
        #viewer iframe { width: 100%; height: 100%; border: none; }
        #back-btn { position: fixed; top: 20px; right: 20px; width: 32px; height: 32px; background: rgba(37, 37, 38, 0.8); border: 1px solid #333; border-radius: 50%; z-index: 200; cursor: pointer; display: none; align-items: center; justify-content: center; color: #fff; }
    </style>
</head>
<body>

    <div class="live-counter">
        <div class="dot"></div>
        <span id="user-count">1</span> Users Online
    </div>

    <div class="auth-bar">
        <div id="user-info" style="display:none;"><img id="user-photo" class="user-img"></div>
        <button id="auth-button" class="btn-auth">Login with Google</button>
    </div>

    <div class="container" id="main-container">
        <textarea id="editor" placeholder="Type URL and press Enter"></textarea>
        <div class="controls-outer">
            <div class="toggle-group"><input type="radio" id="incog-on" name="incognito" value="on"><label for="incog-on">INCOGNITO</label><input type="radio" id="incog-off" name="incognito" value="off" checked><label for="incog-off">NORMAL</label></div>
            <div class="toggle-group"><input type="radio" id="ad-on" name="ads" value="on" checked><label for="ad-on">AD BLOCKING</label><input type="radio" id="ad-off" name="ads" value="off"><label for="ad-off">OFF</label></div>
            <div class="toggle-group"><input type="radio" id="main-mode" name="target" value="main" checked><label for="main-mode">MAIN</label><input type="radio" id="blank-mode" name="target" value="blank"><label for="blank-mode">BLANK</label></div>
        </div>
        <div id="history-section">
            <div class="history-header"><span>Cloud History</span><span id="clear-btn" style="color:#ff4d4d; cursor:pointer;">Clear</span></div>
            <div id="history-list"></div>
        </div>
    </div>

    <div id="viewer">
        <div id="back-btn">✕</div>
        <div id="content-area" style="width:100%; height:100%;"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getDatabase, ref, onValue, push, onDisconnect, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAWhoEU090a3YIQzxrBdOaV6hMI37yvC6s",
          authDomain: "web-view-2dbd5.firebaseapp.com",
          projectId: "web-view-2dbd5",
          storageBucket: "web-view-2dbd5.firebasestorage.app",
          messagingSenderId: "511957552236",
          appId: "1:511957552236:web:3c3895b6287d12dc99dc49",
          measurementId: "G-13V2GP69CT",
          databaseURL: "https://web-view-2dbd5-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);
        const provider = new GoogleAuthProvider();

        // --- LIVE COUNTER LOGIC ---
        const userCountSpan = document.getElementById('user-count');
        const myPresenceRef = push(ref(rtdb, 'presence'));
        
        // When I connect, add me to the list. When I leave, remove me.
        set(myPresenceRef, true);
        onDisconnect(myPresenceRef).remove();

        // Listen for total count
        onValue(ref(rtdb, 'presence'), (snapshot) => {
            const count = snapshot.size || (snapshot.val() ? Object.keys(snapshot.val()).length : 0);
            userCountSpan.innerText = count;
        });

        // --- AUTH & HISTORY LOGIC ---
        let currentUser = null;
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('user-info').style.display = "block";
                document.getElementById('user-photo').src = user.photoURL;
                listenToHistory(user.uid);
            } else {
                document.getElementById('user-info').style.display = "none";
                renderLocal();
            }
        });

        window.launchURL = async (url) => {
            if (!url) return;
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
            
            const isIncog = document.querySelector('input[name="incognito"]:checked').value === 'on';
            if (!isIncog) {
                if (currentUser) await setDoc(doc(db, "histories", currentUser.uid), { urls: arrayUnion(url) }, { merge: true });
                else {
                    let h = JSON.parse(localStorage.getItem('h') || '[]');
                    h = [url, ...h.filter(x => x !== url)].slice(0,20);
                    localStorage.setItem('h', JSON.stringify(h));
                    renderLocal();
                }
            }

            const mode = document.querySelector('input[name="target"]:checked').value;
            if (mode === 'blank') {
                window.open(url, '_blank');
            } else {
                document.getElementById('main-container').style.display = 'none';
                document.getElementById('viewer').style.display = 'block';
                document.getElementById('back-btn').style.display = 'flex';
                document.getElementById('content-area').innerHTML = `<iframe src="${url}" allowfullscreen></iframe>`;
            }
        };

        function listenToHistory(uid) {
            onSnapshot(doc(db, "histories", uid), d => { if(d.exists()) display(d.data().urls.reverse()); });
        }
        function renderLocal() { display(JSON.parse(localStorage.getItem('h') || '[]')); }
        function display(list) {
            const container = document.getElementById('history-section');
            if (list.length === 0) { container.style.display = 'none'; return; }
            container.style.display = 'block';
            document.getElementById('history-list').innerHTML = list.map(u => `<div class="history-item" onclick="launchURL('${u}')">${u}</div>`).join('');
        }

        document.getElementById('editor').onkeydown = (e) => { if(e.key==='Enter') launchURL(e.target.value); };
        document.getElementById('back-btn').onclick = () => location.reload();
        document.getElementById('auth-button').onclick = () => currentUser ? signOut(auth) : signInWithPopup(auth, provider);
    </script>
</body>
</html>
